<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo: Número Escondido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🕵️‍♂️ Número Escondido</h1>
        <p>Tente adivinhar o número entre <strong>0 e 100</strong>.</p>
        
        <div class="input-area">
            <input type="number" id="palpite" placeholder="Digite um número" min="0" max="100">
            <button onclick="verificarPalpite()">Chutar</button>
        </div>

        <p id="mensagem"></p>
        <p id="tentativas">Tentativas: 0</p>
        
        <button id="btn-reiniciar" class="hidden" onclick="reiniciarJogo()">Jogar Novamente</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
